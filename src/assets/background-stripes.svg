<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
    <!-- Tailwind bg-sky-100 is rgb(224 242 254) -->
    <defs>
        <pattern id="diagonal-stripes" patternUnits="userSpaceOnUse" width="100" height="100"
            patternTransform="rotate(45)">        
            <rect x="0" y="0" width="25" height="100" fill="#ab3018" />   
            <rect x="12.5" y="0" width="25" height="100" fill="#eee" />          
            <rect x="25" y="0" width="25" height="100" fill="#1870ab" />
            <rect x="37.5" y="0" width="25" height="100" fill="#eee" />      
            <rect x="50" y="0" width="25" height="100" fill="#ab3018" />      
            <rect x="62.5" y="0" width="25" height="100" fill="#eee" />        
            <rect x="75" y="0" width="25" height="100" fill="#1870ab" />
            <rect x="87.5" y="0" width="25" height="100" fill="#ffffff" />
        </pattern>
    </defs>

    <rect width="100%" height="100%" fill="url(#diagonal-stripes)" />
</svg>